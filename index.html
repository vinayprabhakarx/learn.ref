<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="A clean, minimal reference for Data Structures and Algorithms. Java implementations, complexity analysis, and practice problems." />
  <title>Learn App</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    (function () {
      try {
        const t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches))
          document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) { }
    })();
  </script>
</head>

<body class="hero-page">

  <div class="hero-shell">
    <header class="hero-topbar">
      <a href="index.html" class="hero-logo">/learn.ref</a>
      <button class="hero-theme-toggle btn-interactive" id="theme-toggle" type="button" aria-label="Toggle theme">
        <span class="hero-icon-sun" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg></span>
        <span class="hero-icon-moon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg></span>
      </button>
    </header>

    <main class="hero-center">
      <p class="hero-eyebrow">open-source reference</p>
      <h1 class="hero-heading">Learn App</h1>
      <p class="hero-desc">A centralized hub for learning and reference materials.
      </p>

      <nav class="hero-nav">
        <a href="dsa.html?id=dsa-data-structures" class="hero-link">
          <span class="hero-link-title">Data Structures</span>
          <span class="hero-link-meta">Arrays · Trees · Graphs · Heaps · Tries</span>
          <span class="hero-link-arrow" aria-hidden="true">→</span>
        </a>
        <a href="dsa.html?id=dsa-algorithms" class="hero-link">
          <span class="hero-link-title">Algorithms</span>
          <span class="hero-link-meta">Sorting · DP · Backtracking · Greedy · Divide & Conquer</span>
          <span class="hero-link-arrow" aria-hidden="true">→</span>
        </a>
      </nav>
    </main>

    <footer class="hero-foot">
      <a href="https://vinayprabhakar.dev" target="_blank" rel="noopener noreferrer">@vinayprabhakarx</a>
    </footer>
  </div>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const c = document.documentElement.getAttribute('data-theme');
      const n = c === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', n);
      localStorage.setItem('theme', n);
    });
  </script>
</body>

</html>
