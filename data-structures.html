<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="DSA Reference — Data Structures & Algorithms quick reference with complexity, common problems, and use cases." />
  <title>Data Structures</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    /* Prevent flash of wrong theme on load */
    (function () {
      try {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>

  <header class="ds-header">
    <a href="index.html" class="hero-logo" aria-label="Back to Home">/dsa.ref</a>
    <div class="ds-header-actions">
      <button class="ds-theme-toggle btn-interactive" id="theme-toggle" type="button" aria-label="Toggle dark theme"
        title="Toggle dark theme">
        <span class="ds-icon-sun" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg></span>
        <span class="ds-icon-moon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg></span>
      </button>
    </div>
  </header>
  <main class="ds-wrap">

    <nav class="ds-tabs" id="ds-tabs" aria-label="Category filters"></nav>

    <search>
      <input class="ds-search-input" id="ds-search" type="search" placeholder="Search topics or problems..."
        aria-label="Search DSA topics" />
    </search>

    <section class="ds-grid" id="ds-grid" aria-label="DSA topic cards"></section>

    <footer class="ds-footer">
      Built by <a href="https://vinayprabhakar.dev" target="_blank" rel="noopener noreferrer">@vinayprabhakarx</a>
    </footer>
  </main>

  <!-- ── Card template ── -->
  <template id="ds-card-template">
    <article class="ds-card" tabindex="0">
      <header class="ds-card-head">
        <span class="ds-badge"></span>
        <h2 class="ds-card-title"></h2>
        <span class="ds-chevron" aria-hidden="true">&#9658;</span>
      </header>
      <div class="ds-card-body">
        <div class="ds-card-inner">
          <p class="ds-desc"></p>
          <h3 class="ds-section-label">Complexity</h3>
          <dl class="ds-ops"></dl>
          <h3 class="ds-section-label">Common problems &amp; use cases</h3>
          <ul class="ds-uses-grid"></ul>
          <button class="ds-practice-btn btn-interactive" type="button">Get practice problems ↗</button>
        </div>
      </div>
    </article>
  </template>

  <!-- ── Operation item template ── -->
  <template id="ds-op-template">
    <div class="ds-op-item">
      <dt class="ds-op-name"></dt>
      <dd class="ds-op-tc"></dd>
    </div>
  </template>

  <!-- ── Use-case tag template ── -->
  <template id="ds-use-template">
    <li class="ds-use-tag" tabindex="0" role="button"></li>
  </template>

  <!-- ── Empty state template ── -->
  <template id="ds-empty-template">
    <p class="ds-empty-msg"></p>
  </template>

  <script src="script.js"></script>
</body>

</html>
